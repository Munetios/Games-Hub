<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe - Munetios Games Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://api.munetios.com/beautiful-css/beautiful.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Google Sans Flex", system-ui, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .cell {
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.3);
      }
      .cell:hover:not(.taken) {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }
      .cell.x {
        color: #667eea;
      }
      .cell.o {
        color: #f093fb;
      }
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .toast.hiding {
        animation: slideOut 0.3s ease-in forwards;
      }
      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-4">
    <div class="liquid-glass p-8 max-w-lg">
      <h1 class="text-4xl font-bold text-white mb-6 text-center">
        ❌⭕ Tic-Tac-Toe
      </h1>

      <div class="text-center mb-6">
        <div class="text-white text-xl mb-2">
          Current Turn: <span id="turn" class="font-bold">X</span>
        </div>
        <div class="text-white/80 text-sm">
          X Wins: <span id="xWins">0</span> | O Wins:
          <span id="oWins">0</span> | Draws: <span id="draws">0</span>
        </div>
      </div>

      <div id="board" class="grid grid-cols-3 gap-2 mb-6 mx-auto w-fit"></div>

      <div class="flex gap-4 justify-center mb-4 flex-wrap">
        <button
          id="resetBtn"
          class="bg-white/20 hover:bg-white/30 text-white font-bold py-2 px-6 rounded-lg transition"
        >
          Reset Game
        </button>
        <button
          id="aiBtn"
          class="bg-white/20 hover:bg-white/30 text-white font-bold py-2 px-6 rounded-lg transition"
        >
          Play vs AI
        </button>
        <button
          id="cheatsBtn"
          class="bg-yellow-500/30 hover:bg-yellow-500/50 text-white font-bold py-2 px-6 rounded-lg transition border border-yellow-400/40"
        >
          🎭 Cheats
        </button>
      </div>

      <!-- Cheats Panel -->
      <div
        id="cheatsPanel"
        class="hidden bg-white/10 rounded-xl p-4 mb-4 border border-yellow-400/30"
      >
        <h3 class="text-white font-bold mb-3 text-lg">🎭 Active Cheats</h3>
        <label class="flex items-center gap-3 text-white mb-3 cursor-pointer">
          <input
            type="checkbox"
            id="cheatReplaceX"
            class="w-5 h-5 accent-yellow-400"
          />
          <div>
            <div class="font-semibold">Replace X with O</div>
            <div class="text-xs text-white/60">
              X's moves will place O tokens instead
            </div>
          </div>
        </label>
        <label class="flex items-center gap-3 text-white cursor-pointer">
          <input
            type="checkbox"
            id="cheatOOverwrite"
            class="w-5 h-5 accent-yellow-400"
          />
          <div>
            <div class="font-semibold">O Ignores Grid Limits</div>
            <div class="text-xs text-white/60">
              O can overwrite X's already-placed marks
            </div>
          </div>
        </label>
      </div>

      <div class="text-center">
        <a href="index.html" class="text-white/80 hover:text-white underline"
          >← Back to Hub</a
        >
      </div>
    </div>

    <script>
      const boardElement = document.getElementById("board");
      const turnElement = document.getElementById("turn");
      let board = ["", "", "", "", "", "", "", "", ""];
      let currentPlayer = "X";
      let gameActive = true;
      let aiMode = false;
      let xWins = parseInt(localStorage.getItem("tttXWins")) || 0;
      let oWins = parseInt(localStorage.getItem("tttOWins")) || 0;
      let draws = parseInt(localStorage.getItem("tttDraws")) || 0;
      let cheatReplaceX = false;
      let cheatOOverwrite = false;

      document.getElementById("xWins").textContent = xWins;
      document.getElementById("oWins").textContent = oWins;
      document.getElementById("draws").textContent = draws;

      function showToast(message, duration = 3000) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.classList.add("hiding");
          setTimeout(() => toast.remove(), 300);
        }, duration);
      }

      const winPatterns = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6],
      ];

      function createBoard() {
        boardElement.innerHTML = "";
        for (let i = 0; i < 9; i++) {
          const cell = document.createElement("div");
          cell.className = "cell rounded-lg";
          cell.dataset.index = i;
          cell.addEventListener("click", handleCellClick);
          boardElement.appendChild(cell);
        }
        updateBoard();
      }

      function updateBoard() {
        const cells = document.querySelectorAll(".cell");
        cells.forEach((cell, index) => {
          const value = board[index];
          cell.textContent = value;
          cell.className = "cell rounded-lg";
          if (value) {
            cell.classList.add("taken", value.toLowerCase());
          }
        });
        turnElement.textContent = currentPlayer;
      }

      function handleCellClick(e) {
        const index = parseInt(e.target.dataset.index);
        if (!gameActive) return;
        // Allow O to overwrite X cells if the overwrite cheat is active
        if (
          board[index] !== "" &&
          !(cheatOOverwrite && currentPlayer === "O" && board[index] === "X")
        )
          return;

        makeMove(index);

        if (aiMode && gameActive && currentPlayer === "O") {
          setTimeout(aiMove, 500);
        }
      }

      function makeMove(index) {
        // Cheat: replace X moves with O pieces
        const piece =
          cheatReplaceX && currentPlayer === "X" ? "O" : currentPlayer;
        board[index] = piece;
        updateBoard();

        if (checkWin(piece)) {
          showToast(`🎉 ${currentPlayer} Wins!`, 3000);
          gameActive = false;

          if (currentPlayer === "X") {
            xWins++;
            localStorage.setItem("tttXWins", xWins);
            document.getElementById("xWins").textContent = xWins;
          } else {
            oWins++;
            localStorage.setItem("tttOWins", oWins);
            document.getElementById("oWins").textContent = oWins;
          }
          return;
        }

        if (board.every((cell) => cell !== "")) {
          showToast("🤝 Draw!", 3000);
          gameActive = false;
          draws++;
          localStorage.setItem("tttDraws", draws);
          document.getElementById("draws").textContent = draws;
          return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateBoard();
      }

      function checkWin(player) {
        const p = player || currentPlayer;
        return winPatterns.some((pattern) => {
          return pattern.every((index) => board[index] === p);
        });
      }

      function aiMove() {
        // Simple AI: Try to win, block opponent, or pick random
        const emptyCells = board
          .map((cell, i) => (cell === "" ? i : null))
          .filter((i) => i !== null);

        // Try to win
        for (let i of emptyCells) {
          board[i] = "O";
          if (checkWin()) {
            board[i] = "";
            makeMove(i);
            return;
          }
          board[i] = "";
        }

        // Block opponent
        for (let i of emptyCells) {
          board[i] = "X";
          currentPlayer = "X";
          if (checkWin()) {
            currentPlayer = "O";
            board[i] = "";
            makeMove(i);
            return;
          }
          currentPlayer = "O";
          board[i] = "";
        }

        // Pick center or random
        if (emptyCells.includes(4)) {
          makeMove(4);
        } else {
          const randomIndex =
            emptyCells[Math.floor(Math.random() * emptyCells.length)];
          makeMove(randomIndex);
        }
      }

      function resetGame() {
        board = ["", "", "", "", "", "", "", "", ""];
        currentPlayer = "X";
        gameActive = true;
        updateBoard();
        showToast("🔄 Game Reset", 1500);
      }

      function toggleAI() {
        aiMode = !aiMode;
        resetGame();
        if (aiMode) {
          showToast("🤖 AI Mode Enabled", 2000);
        } else {
          showToast("👥 Two Player Mode", 2000);
        }
      }

      document.getElementById("resetBtn").addEventListener("click", resetGame);
      document.getElementById("aiBtn").addEventListener("click", toggleAI);

      document.getElementById("cheatsBtn").addEventListener("click", () => {
        document.getElementById("cheatsPanel").classList.toggle("hidden");
      });

      document
        .getElementById("cheatReplaceX")
        .addEventListener("change", (e) => {
          cheatReplaceX = e.target.checked;
          showToast(
            cheatReplaceX
              ? "🎭 Cheat ON: X places O tokens!"
              : "🎭 Replace X cheat off",
            2000,
          );
        });

      document
        .getElementById("cheatOOverwrite")
        .addEventListener("change", (e) => {
          cheatOOverwrite = e.target.checked;
          showToast(
            cheatOOverwrite
              ? "🎭 Cheat ON: O can overwrite X marks!"
              : "🎭 Overwrite cheat off",
            2000,
          );
        });

      createBoard();
    </script>
  </body>
</html>
