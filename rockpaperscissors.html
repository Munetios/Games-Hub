<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors - Munetios Games Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://api.munetios.com/beautiful-css/beautiful.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Google Sans Flex", system-ui, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .choice-btn {
        font-size: 4rem;
        padding: 1.5rem;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.3s;
        width: 110px;
        height: 110px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .choice-btn:hover {
        transform: scale(1.15);
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.6);
      }
      .choice-btn.selected {
        background: rgba(255, 255, 255, 0.3);
        border-color: #fff;
        transform: scale(1.1);
      }
      .result-win {
        color: #4ade80;
      }
      .result-lose {
        color: #f87171;
      }
      .result-draw {
        color: #facc15;
      }
      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 50px;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.16),
          rgba(255, 255, 255, 0.06)
        );
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        backdrop-filter: blur(2px) saturate(190%) brightness(105%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        z-index: 1000;
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .toast.hiding {
        animation: slideOut 0.3s ease-in forwards;
      }
      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }
      @keyframes bounce {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }
      .bounce {
        animation: bounce 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div class="liquid-glass p-8 max-w-md w-full text-center">
      <h1 class="text-4xl font-bold text-white mb-2">🪨📄✂️</h1>
      <h2 class="text-2xl font-bold text-white mb-6">Rock Paper Scissors</h2>

      <div
        class="grid grid-cols-3 gap-4 text-white text-center mb-6 bg-white/10 rounded-xl p-3"
      >
        <div>
          <div class="text-3xl font-bold text-green-300" id="wins">0</div>
          <div class="text-xs opacity-70">Wins</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-yellow-300" id="draws">0</div>
          <div class="text-xs opacity-70">Draws</div>
        </div>
        <div>
          <div class="text-3xl font-bold text-red-300" id="losses">0</div>
          <div class="text-xs opacity-70">Losses</div>
        </div>
      </div>

      <p class="text-white/80 mb-4 text-lg">Choose your move:</p>

      <div class="flex justify-center gap-6 mb-6">
        <button
          class="choice-btn"
          data-choice="rock"
          onclick="play('rock')"
          title="Rock"
        >
          🪨
        </button>
        <button
          class="choice-btn"
          data-choice="paper"
          onclick="play('paper')"
          title="Paper"
        >
          📄
        </button>
        <button
          class="choice-btn"
          data-choice="scissors"
          onclick="play('scissors')"
          title="Scissors"
        >
          ✂️
        </button>
      </div>

      <div
        id="resultArea"
        class="min-h-28 flex flex-col items-center justify-center"
      >
        <p class="text-white/50 text-lg">Pick a move to start!</p>
      </div>

      <div class="mt-4 flex gap-3 justify-center">
        <button
          onclick="resetScores()"
          class="bg-white/20 hover:bg-white/30 text-white font-bold py-2 px-5 rounded-lg transition text-sm"
        >
          Reset Scores
        </button>
        <a
          href="index.html"
          class="bg-white/20 hover:bg-white/30 text-white font-bold py-2 px-5 rounded-lg transition text-sm"
          >← Hub</a
        >
      </div>
    </div>

    <script>
      const choices = ["rock", "paper", "scissors"];
      const emojis = { rock: "🪨", paper: "📄", scissors: "✂️" };
      const labels = { rock: "Rock", paper: "Paper", scissors: "Scissors" };

      let wins = parseInt(localStorage.getItem("rpsWins")) || 0;
      let losses = parseInt(localStorage.getItem("rpsLosses")) || 0;
      let draws = parseInt(localStorage.getItem("rpsDraws")) || 0;
      updateDisplay();

      function showToast(msg, dur = 2500) {
        const t = document.createElement("div");
        t.className = "toast";
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => {
          t.classList.add("hiding");
          setTimeout(() => t.remove(), 300);
        }, dur);
      }

      function updateDisplay() {
        document.getElementById("wins").textContent = wins;
        document.getElementById("losses").textContent = losses;
        document.getElementById("draws").textContent = draws;
      }

      function getResult(player, cpu) {
        if (player === cpu) return "draw";
        if (
          (player === "rock" && cpu === "scissors") ||
          (player === "paper" && cpu === "rock") ||
          (player === "scissors" && cpu === "paper")
        )
          return "win";
        return "lose";
      }

      function play(playerChoice) {
        document
          .querySelectorAll(".choice-btn")
          .forEach((b) => b.classList.remove("selected"));
        document
          .querySelector(`[data-choice="${playerChoice}"]`)
          .classList.add("selected");

        const cpuChoice = choices[Math.floor(Math.random() * 3)];
        const result = getResult(playerChoice, cpuChoice);

        const area = document.getElementById("resultArea");
        area.classList.remove("bounce");
        void area.offsetWidth;
        area.classList.add("bounce");

        if (result === "win") {
          wins++;
          localStorage.setItem("rpsWins", wins);
        } else if (result === "lose") {
          losses++;
          localStorage.setItem("rpsLosses", losses);
        } else {
          draws++;
          localStorage.setItem("rpsDraws", draws);
        }
        updateDisplay();

        const resultClass =
          result === "win"
            ? "result-win"
            : result === "lose"
              ? "result-lose"
              : "result-draw";
        const resultText =
          result === "win"
            ? "🎉 You Win!"
            : result === "lose"
              ? "😞 You Lose!"
              : "🤝 Draw!";

        area.innerHTML = `
          <div class="text-5xl mb-2 flex gap-4 items-center">
            <span title="You">${emojis[playerChoice]}</span>
            <span class="text-white/40 text-3xl">vs</span>
            <span title="CPU">${emojis[cpuChoice]}</span>
          </div>
          <div class="text-sm text-white/60 mb-2">You: ${labels[playerChoice]} · CPU: ${labels[cpuChoice]}</div>
          <div class="text-2xl font-bold ${resultClass}">${resultText}</div>
        `;

        showToast(resultText, 2000);
      }

      function resetScores() {
        wins = losses = draws = 0;
        ["rpsWins", "rpsLosses", "rpsDraws"].forEach((k) =>
          localStorage.removeItem(k),
        );
        updateDisplay();
        document.getElementById("resultArea").innerHTML =
          `<p class="text-white/50 text-lg">Scores reset! Pick a move.</p>`;
        document
          .querySelectorAll(".choice-btn")
          .forEach((b) => b.classList.remove("selected"));
        showToast("🔄 Scores reset!", 1500);
      }
    </script>
  </body>
</html>
